# Render Blueprint — repo root (default path Render looks for)
# API only (free tier, no payment required).
# Hourly scraping: use free https://cron-job.org → GET https://<your-api>.onrender.com/api/v1/scrape

services:
  - type: web
    name: aaipo-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SCHEDULER_ENABLED
        value: false
      - key: SCRAPER_INTERVAL_MINUTES
        value: 60
      - key: CORS_ORIGINS
        value: "*"
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
