# Render Blueprint — IPO Tracker backend
# Deploy: Dashboard → New → Blueprint → connect repo → set blueprint path to backend/render.yaml
#
# Services:
#   aaipo-api     — FastAPI REST API (free web service)
#   aaipo-scraper — hourly scrape cron (UTC schedule "0 * * * *" = every hour at :00 UTC)

services:
  - type: web
    name: aaipo-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SCHEDULER_ENABLED
        value: false
      - key: SCRAPER_INTERVAL_MINUTES
        value: 60
      - key: CORS_ORIGINS
        value: "*"
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: aaipo-scraper
    runtime: python
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_scrape_once.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_DB_URL
        fromService:
          type: web
          name: aaipo-api
          envVarKey: SUPABASE_DB_URL
      - key: SUPABASE_DB_USER
        fromService:
          type: web
          name: aaipo-api
          envVarKey: SUPABASE_DB_USER
      - key: SUPABASE_DB_PASSWORD
        fromService:
          type: web
          name: aaipo-api
          envVarKey: SUPABASE_DB_PASSWORD
      - key: DATABASE_URL
        fromService:
          type: web
          name: aaipo-api
          envVarKey: DATABASE_URL
