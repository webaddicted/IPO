# ============================================================================
# IPO Tracker backend configuration
# Override secrets via environment variables — never commit real credentials.
# ============================================================================

spring.application.name=ipo-tracker-backend
server.port=${PORT:8081}

# Profiles: supabase (default) | local (Homebrew PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:supabase}

# ---- Supabase (PostgreSQL) -------------------------------------------------
# Project: zqvlzrrumfewlyqipphz  Region: ap-northeast-1 (Tokyo)
# Override via env: SUPABASE_DB_URL, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SUPABASE_DB_USER:postgres.zqvlzrrumfewlyqipphz}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}

# Supabase API keys (Project Settings → API)
supabase.url=${SUPABASE_URL:https://zqvlzrrumfewlyqipphz.supabase.co}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema is owned by supabase/migrations — never let Hibernate mutate it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---- Scraper ---------------------------------------------------------------
scraper.enabled=${SCRAPER_ENABLED:true}
scraper.base-url=https://www.chittorgarh.com
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36
scraper.timeout-ms=15000
scraper.polite-delay-ms=2500
# How often the IPO list is refreshed (ms). Default 1 hour.
scraper.list-fixed-rate-ms=3600000

# ---- CORS ------------------------------------------------------------------
# Comma-separated origins allowed to call the API. '*' for dev only.
app.cors.allowed-origins=${CORS_ORIGINS:*}

# ---- Logging ---------------------------------------------------------------
logging.level.com.ipotracker=INFO
